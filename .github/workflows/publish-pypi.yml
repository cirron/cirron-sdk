name: Publish to PyPI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag matches pyproject version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - id: check
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION != pyproject.toml $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.11'
            extras_args: '--all-extras'
          - python-version: '3.12'
            extras_args: '--all-extras'
          - python-version: '3.13'
            extras_args: '--all-extras'
          - python-version: '3.14'
            extras_args: >-
              --extra pandas --extra polars --extra arrow
              --extra torch --extra transformers --extra sklearn
              --extra hf --extra image --extra safetensors --extra dotenv
              --extra s3 --extra gcs --extra azure
              --extra postgres --extra mysql
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync ${{ matrix.extras_args }}
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src
      - run: uv run pytest tests/unit -v

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - run: uv tool run twine check dist/*
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/cirron-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  attach-dist:
    name: Attach dist to GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPO" --clobber
