name: sentiment-rnn
framework: tensorflow
type: classification
version: "1.0.0"
description: Bidirectional LSTM sentiment classifier with expanded config

servingConfig:
  runtime: onnx
  class_labels:
    - negative
    - positive
    - neutral
  feature_order:
    - text
  input_schema:
    type: object
    properties:
      text:
        type: string
    required:
      - text
  output_schema:
    type: object
    properties:
      prediction:
        type: string
      confidence:
        type: number

profiling:
  snapshots: sampled
  sample_rate: 0.05
  flush_interval: 2.5
  frameworks:
    - tensorflow

env:
  BATCH_SIZE: "64"
  THRESHOLD: "0.5"
  CONFIG: '{"capture_embeddings": false, "log_attention": false}'

secrets:
  - openai-api-key
  - database-credentials

data:
  training: training-data-v2
  validation: s3://ml-data/validation/
  test: postgres://prod/test_set
