name: Publish to TestPyPI

# Triggered by GitHub Release publication. Auto's `auto next` flow on
# the rc branch creates a Pre-release. We listen to the `release` event
# rather than `push: tags:` because auto's changelog commit carries the
# literal "[skip ci]" directive (hardcoded in auto-core), which blocks
# all push-triggered workflows for the tag push. The `release` event is
# not gated by that directive.
on:
  release:
    types: [prereleased]

permissions:
  contents: read

concurrency:
  group: publish-testpypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run ruff check src tests
      - run: uv run mypy src
      - run: uv run pytest tests/unit -v

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - run: uv tool run twine check dist/*
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/cirron-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
