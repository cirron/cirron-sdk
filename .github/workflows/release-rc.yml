name: Release (rc)

on:
  push:
    branches: [rc]

permissions:
  contents: read

concurrency:
  group: release-rc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-rc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check skip-release opt-out
        id: skip
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s' "$HEAD_COMMIT_MESSAGE" | grep -qE '\[skip release\]|skip-release'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.skip.outputs.skip == 'false'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        if: steps.skip.outputs.skip == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        if: steps.skip.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v7

      - name: Install Python deps
        if: steps.skip.outputs.skip == 'false'
        run: uv sync

      - name: Set up Node.js
        if: steps.skip.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install auto
        if: steps.skip.outputs.skip == 'false'
        run: |
          npm install -g \
            auto \
            @auto-it/git-tag \
            @auto-it/exec \
            @auto-it/released \
            @auto-it/first-time-contributor \
            @auto-it/all-contributors

      - name: Run auto next
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        # `auto next` uses the branch name as the prerelease identifier.
        # Branch is `rc`, so tags become vX.Y.Z-rc.N.
        run: npx auto next
