name: Publish to PyPI

# Triggered by GitHub Release publication (auto creates the Release as
# part of `auto shipit` on main). We listen for the `release` event
# instead of `push: tags:` because auto's changelog commit carries the
# literal "[skip ci]" directive (hardcoded in auto-core), which blocks
# all push-triggered workflows for the tag push. The `release` event is
# not gated by that directive.
on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  filter:
    name: Stable releases only
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    steps:
      - run: echo "publishing ${{ github.event.release.tag_name }} to PyPI"

  test:
    name: Test
    needs: filter
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.11'
            extras_args: '--all-extras'
          - python-version: '3.12'
            extras_args: '--all-extras'
          - python-version: '3.13'
            extras_args: '--all-extras'
          - python-version: '3.14'
            extras_args: >-
              --extra pandas --extra polars --extra arrow
              --extra torch --extra transformers --extra sklearn
              --extra hf --extra image --extra safetensors --extra dotenv
              --extra s3 --extra gcs --extra azure
              --extra postgres --extra mysql
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync ${{ matrix.extras_args }}
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src
      - run: uv run pytest tests/unit -v

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - run: uv tool run twine check dist/*
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/cirron-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  attach-dist:
    name: Attach dist to GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPO" --clobber
