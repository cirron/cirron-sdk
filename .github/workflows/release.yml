name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip when the head commit was authored by the auto-bump bot.
    # auto_bump.sh sets author email to actions@github.com — no human
    # commit will have that address, and matching on author email is
    # immune to false positives from commit-subject content (commit
    # messages that describe skip-release behavior, etc.).
    # PR-label skip-release is handled by auto's own logic, not here.
    if: >-
      github.event.head_commit.author.email != 'actions@github.com'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python deps
        run: uv sync

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install auto
        run: |
          npm install -g \
            auto \
            @auto-it/git-tag \
            @auto-it/exec \
            @auto-it/released \
            @auto-it/first-time-contributor \
            @auto-it/all-contributors

      - name: Run auto shipit
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx auto shipit
